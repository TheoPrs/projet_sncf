name: CI

on:                  
  push:
    branches: [main]
  pull_request:

jobs:                 
  test:                
    runs-on: ubuntu-latest  
    
    steps:             
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: flake
        run: flake8 ingestion/ beam/

      - name: Run tests
        run: pytest

      - name: dbt compile
        run: cd sncf_pipeline && dbt compile --profiles-dir .